name: Run Playwright - AI QA Agent

on:
  workflow_dispatch:
    inputs:
      targetUrl:
        description: "Website URL to test"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create Directories
        run: |
          mkdir -p runner
          mkdir -p test-results
          mkdir -p playwright-report

      # =========================
      # 1. GENERATE DISCOVERY TEST
      # =========================
      - name: Generate Dynamic Discovery Test
        run: |
          cat > runner/generated.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';
          import fs from 'fs';

          test('Dynamic QA Discovery + Execution Layer', async ({ page }) => {

            const url = process.env.TARGET_URL!;

            const consoleErrors: string[] = [];
            const networkFailures: any[] = [];

            page.on('console', msg => {
              if (msg.type() === 'error') {
                consoleErrors.push(msg.text());
              }
            });

            page.on('response', response => {
              if (response.status() >= 400) {
                networkFailures.push({
                  url: response.url(),
                  status: response.status()
                });
              }
            });

            await page.goto(url, {
              waitUntil: 'networkidle',
              timeout: 60000
            });

            await page.waitForTimeout(3000);

            const title = await page.title();

            const buttons = await page.locator('button,[role="button"]').count();
            const inputs = await page.locator('input,textarea,[role="textbox"]').count();
            const dropdowns = await page.locator('select,[role="combobox"]').count();
            const links = await page.locator('a').count();

            const dom = await page.content();

            await page.screenshot({
              path: 'test-results/homepage.png',
              fullPage: true
            });

            fs.writeFileSync('test-results/dom.html', dom);

            // =========================
            // 2. DISCOVERY OUTPUT
            // =========================
            const discovery = {
              executionTime: new Date().toISOString(),
              url,
              title,
              buttons,
              inputs,
              dropdowns,
              links,
              consoleErrors,
              networkFailures
            };

            fs.writeFileSync(
              'test-results/discovery.json',
              JSON.stringify(discovery, null, 2)
            );

            // =========================
            // 3. AI-LIKE QA RULE ENGINE (NEW)
            // =========================
            const testResults: any[] = [];

            // Basic Assertions (TURN DISCOVERY INTO QA SIGNALS)
            testResults.push({
              test: "Page loads successfully",
              status: title ? "PASSED" : "FAILED"
            });

            testResults.push({
              test: "Has interactive elements",
              status: buttons + inputs > 0 ? "PASSED" : "FAILED"
            });

            testResults.push({
              test: "No critical console errors",
              status: consoleErrors.length === 0 ? "PASSED" : "FAILED",
              details: consoleErrors
            });

            testResults.push({
              test: "No major network failures",
              status: networkFailures.length === 0 ? "PASSED" : "FAILED",
              details: networkFailures
            });

            // Advanced heuristic checks
            testResults.push({
              test: "Page has usable navigation density",
              status: links > 10 ? "PASSED" : "WARNING",
              value: links
            });

            testResults.push({
              test: "Form presence validation",
              status: inputs > 0 ? "PASSED" : "WARNING"
            });

            fs.writeFileSync(
              'test-results/qa-results.json',
              JSON.stringify(testResults, null, 2)
            );

            // =========================
            // 4. FINAL CONSOLIDATED REPORT
            // =========================
            const finalReport = {
              ...discovery,
              qaResults: testResults,
              overallStatus:
                testResults.every(t => t.status === "PASSED")
                  ? "HEALTHY"
                  : "ISSUES_DETECTED"
            };

            fs.writeFileSync(
              'test-results/final-report.json',
              JSON.stringify(finalReport, null, 2)
            );

            console.log(JSON.stringify(finalReport, null, 2));

            expect(title).toBeTruthy();
          });
          EOF

      # =========================
      # 5. RUN TESTS
      # =========================
      - name: Run Tests
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: npm run test:ci

      # =========================
      # 6. SHOW REPORT
      # =========================
      - name: Show Final Report
        if: always()
        run: |
          echo "========== FINAL QA REPORT =========="
          cat test-results/final-report.json || true
          echo "====================================="

      # =========================
      # 7. UPLOAD ARTIFACTS
      # =========================
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            runner/

      # =========================
      # 8. SUMMARY
      # =========================
      - name: Summary
        if: always()
        run: |
          echo "Execution ID: ${{ github.event.inputs.executionId }}"
          echo "Target URL: ${{ github.event.inputs.targetUrl }}"
          echo "Status: AI QA Agent Execution Completed"
