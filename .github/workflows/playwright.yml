name: Run Playwright

on:
  workflow_dispatch:
    inputs:
      executionId:
        required: false
        type: string

      requestedBy:
        required: false
        type: string

      targetUrl:
        required: false
        type: string

      scriptFileName:
        required: false
        type: string
        default: runner/generated.spec.ts

      scriptContent:
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Ensure Directory Exists
        run: mkdir -p $(dirname "${{ github.event.inputs.scriptFileName }}")

      - name: Write Generated Test
        run: |
          cat << 'EOF' > ${{ github.event.inputs.scriptFileName }}
          ${{ github.event.inputs.scriptContent }}
          EOF

      - name: Install Playwright
        run: npx playwright install

      - name: Run Playwright Tests
        run: npx playwright test ${{ github.event.inputs.scriptFileName }}

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.inputs.executionId }}
          path: |
            playwright-report/
            test-results/

      - name: Execution Summary
        if: always()
        run: |
          echo "executionId=${{ github.event.inputs.executionId }}"
          echo "status=$?"
