name: Run Playwright

on:
  workflow_dispatch:
    inputs:
      userRequest:
        description: "User testing request"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout Repo
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2) Setup Node.js (updated safe version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3) Debug workspace
      - name: Debug Workspace
        run: |
          pwd
          ls -la

      # 4) Install dependencies
      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 5) Ensure directory (SAFE - no crash)
      - name: Ensure Directory Exists
        run: |
          mkdir -p generated-tests

      # 6) Generate Playwright test
      - name: Generate Test File
        run: |
          cat > generated-tests/generated.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';

          test('Generated Test', async ({ page }) => {
            console.log("User Request: ${{ github.event.inputs.userRequest }}");

            await page.goto('https://qacart.com/');

            await expect(page).toHaveTitle(/QAcart|QA/i);
          });
          EOF

      # 7) Install browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 8) Run tests (non-fatal safety)
      - name: Run Playwright Tests
        continue-on-error: true
        run: |
          npx playwright test generated-tests/generated.spec.ts

      # 9) Upload artifacts (safe)
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/

      # 10) Execution summary
      - name: Execution Summary
        if: always()
        run: |
          echo "Execution ID: ${{ github.event.inputs.executionId }}"
          echo "User Request: ${{ github.event.inputs.userRequest }}"
          echo "Run ID: ${{ github.run_id }}"
          node -v
          npm -v
