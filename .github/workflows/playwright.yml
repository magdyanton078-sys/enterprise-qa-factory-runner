name: Run Playwright

on:
  workflow_dispatch:
    inputs:
      userRequest:
        description: "User testing request"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Clean Previous Results
        run: npm run clean

      - name: Ensure Directories
        run: |
          mkdir -p runner
          mkdir -p test-results
          mkdir -p playwright-report

      - name: Generate Test File (Fixed Logging)
        run: |
          cat > runner/generated.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';

          test('Generated Test', async ({ page }) => {
            const userRequest = "${{ github.event.inputs.userRequest }}";

            console.log("User Request:", userRequest);

            await page.goto('https://qacart.com/');

            // TEMP SAFE ASSERTION (avoid fake failures)
            await expect(page).toHaveURL(/qacart/i);
          });
          EOF

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Tests
        run: npx playwright test

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            runner/

      - name: Execution Summary
        if: always()
        run: |
          echo "Execution ID: ${{ github.event.inputs.executionId }}"
          echo "User Request: ${{ github.event.inputs.userRequest }}"
          node -v
          npm -v
