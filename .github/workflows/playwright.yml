name: Run Playwright

on:
  workflow_dispatch:
    inputs:
      userRequest:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Debug Input
        run: |
          echo "USER REQUEST:"
          echo "${{ github.event.inputs.userRequest }}"

      - name: Generate Test File
        run: |
          mkdir -p runner
          cat <<EOF > runner/generated.spec.ts
          import { test, expect } from '@playwright/test';

          test('generated test', async ({ page }) => {
            await page.goto('https://qacart.com/');
            console.log("User request: ${{ github.event.inputs.userRequest }}");
          });
          EOF

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Tests
        run: npx playwright test runner/generated.spec.ts

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: |
            playwright-report/
            test-results/
