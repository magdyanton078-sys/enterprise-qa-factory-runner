name: Enterprise AI QA Agent

on:
  workflow_dispatch:
    inputs:
      targetUrl:
        description: "Target Website URL"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:
  enterprise-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Install Browsers
        run: npx playwright install --with-deps

      - name: Prepare Workspace
        run: |
          mkdir -p generated-tests
          mkdir -p test-results

      ####################################################
      # DISCOVERY (IMPORTANT FIX)
      ####################################################
      - name: Run Discovery Spec
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          npx playwright test discovery.spec.ts

          echo "Checking discovery output..."
          test -f test-results/discovery.json || (echo "Missing discovery.json" && exit 1)

      ####################################################
      # GENERATE TESTS
      ####################################################
      - name: Generate Tests
        run: |
          npx ts-node scripts/test-generator.ts
          test -f test-results/generated-tests.json || (echo "Missing tests" && exit 1)

      ####################################################
      # BUILD SPECS
      ####################################################
      - name: Build Specs
        run: |
          npx ts-node scripts/spec-builder.ts
          test -f generated-tests/generated.spec.ts || (echo "Missing spec" && exit 1)

      ####################################################
      # EXECUTE
      ####################################################
      - name: Run Tests
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          npx playwright test generated-tests

      ####################################################
      # ANALYZE
      ####################################################
      - name: Analyze
        if: always()
        run: |
          npx ts-node scripts/defect-analyzer.ts

      ####################################################
      # SUMMARY
      ####################################################
      - name: Summary
        if: always()
        run: |
          cat test-results/final-report.json || echo "No report"

      ####################################################
      # ARTIFACTS
      ####################################################
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-run
          path: |
            generated-tests/
            test-results/
