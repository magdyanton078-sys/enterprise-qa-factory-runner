name: Enterprise AI QA Agent

on:
  workflow_dispatch:
    inputs:

      targetUrl:
        description: "Target Website URL"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:

  enterprise-qa:

    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      ####################################################
      # Checkout Repository
      ####################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Setup Node
      ####################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      ####################################################
      # Install Dependencies
      ####################################################

      - name: Install Dependencies
        run: npm install

      ####################################################
      # Install Playwright Browsers
      ####################################################

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      ####################################################
      # Prepare Workspace
      ####################################################

      - name: Prepare Workspace
        run: |
          mkdir -p generated-tests
          mkdir -p test-results
          mkdir -p playwright-report
          mkdir -p qa-artifacts

      ####################################################
      # Discovery Phase (FIXED)
      ####################################################

      - name: Execute Discovery Engine
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          npx ts-node scripts/discovery.ts

      ####################################################
      # Generate Test Cases
      ####################################################

      - name: Generate Dynamic Test Cases
        run: |
          npx ts-node scripts/test-generator.ts

      ####################################################
      # Build Playwright Specs
      ####################################################

      - name: Build Generated Specs
        run: |
          npx ts-node scripts/spec-builder.ts

      ####################################################
      # VALIDATION STEP (IMPORTANT FIX)
      ####################################################

      - name: Validate Generated Tests
        run: |
          echo "Checking generated tests..."
          ls -la generated-tests || true
          if [ ! -f generated-tests/generated.spec.ts ]; then
            echo "ERROR: No generated tests found!"
            exit 1
          fi

      ####################################################
      # Execute Generated Suite (ONLY SOURCE OF TRUTH)
      ####################################################

      - name: Execute Generated Tests
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          npx playwright test generated-tests

      ####################################################
      # AI Defect Analysis
      ####################################################

      - name: Analyze Results
        if: always()
        run: |
          npx ts-node scripts/defect-analyzer.ts

      ####################################################
      # Show Summary
      ####################################################

      - name: QA Summary
        if: always()
        run: |

          echo ""
          echo "==========================================="
          echo "Enterprise QA Execution Summary"
          echo "==========================================="

          if [ -f test-results/final-report.json ]; then
            cat test-results/final-report.json
          else
            echo "No final report generated."
          fi

          echo ""
          echo "Execution ID : ${{ github.event.inputs.executionId }}"
          echo "Target URL   : ${{ github.event.inputs.targetUrl }}"
          echo "==========================================="

      ####################################################
      # Upload Reports
      ####################################################

      - name: Upload QA Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-qa-${{ github.run_id }}
          path: |
            generated-tests/
            playwright-report/
            test-results/
            qa-artifacts/
          if-no-files-found: warn

      ####################################################
      # Finish
      ####################################################

      - name: Finish
        if: always()
        run: |
          echo ""
          echo "Enterprise QA Factory Completed Successfully."
          echo ""
