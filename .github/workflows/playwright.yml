name: Run Playwright

on:
  workflow_dispatch:
    inputs:
      userRequest:
        required: true
        type: string

      executionId:
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout Repo
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2) Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3) Install Dependencies
      - name: Install Dependencies
        run: |
          npm ci || npm install

      # 4) Ensure Directory Exists
      - name: Ensure Directory Exists
        run: |
          mkdir -p runner

      # 5) Generate Test File
      - name: Generate Test File
        run: |
          cat <<EOF > runner/generated.spec.ts
          import { test, expect } from '@playwright/test';

          test('Generated Test', async ({ page }) => {
            console.log("User Request: ${{ github.event.inputs.userRequest }}");

            await page.goto('https://qacart.com/');

            await expect(page).toHaveTitle(/QAcart|QA/i);
          });
          EOF

      # 6) Install Playwright Browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 7) Run Playwright Tests
      - name: Run Playwright Tests
        run: npx playwright test runner/generated.spec.ts

      # 8) Post Setup Node.js
      - name: Post Setup Node.js
        if: always()
        run: |
          echo "Execution ID: ${{ github.event.inputs.executionId }}"
          echo "User Request: ${{ github.event.inputs.userRequest }}"
          node -v
          npm -v
