name: Run Playwright

on:
  workflow_dispatch:
    inputs:
      targetUrl:
        description: "Website URL to test"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create Directories
        run: |
          mkdir -p runner
          mkdir -p test-results
          mkdir -p playwright-report

      - name: Generate Test File
        run: |
          cat > runner/generated.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';

          test('Dynamic Website Test', async ({ page }) => {

            const url = process.env.TARGET_URL;

            console.log("Testing URL:", url);

            await page.goto(url, {
              waitUntil: 'domcontentloaded'
            });

            await expect(page).toHaveURL(/.*/);

            const title = await page.title();
            expect(title).toBeTruthy();

            const links = await page.locator('a').count();
            console.log("Links:", links);

            expect(links).toBeGreaterThanOrEqual(0);
          });
          EOF

      - name: Run Tests
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: npm run test:ci

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            runner/

      - name: Summary
        if: always()
        run: |
          echo "Execution ID: ${{ github.event.inputs.executionId }}"
          echo "Target URL: ${{ github.event.inputs.targetUrl }}"
