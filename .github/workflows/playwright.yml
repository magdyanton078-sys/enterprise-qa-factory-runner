name: Run Playwright

on:
  workflow_dispatch:
    inputs:
      executionId:
        required: true
        type: string

      requestedBy:
        required: false
        type: string

      targetUrl:
        required: false
        type: string

      scriptFileName:
        required: true
        type: string
        default: runner/generated.spec.ts

      scriptContent:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Create Test Folder
        run: mkdir -p runner

      - name: Write Generated Test
        run: |
          printf "%s" "${{ github.event.inputs.scriptContent }}" > ${{ github.event.inputs.scriptFileName }}

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test ${{ github.event.inputs.scriptFileName }}

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.inputs.executionId }}
          path: |
            playwright-report/
            test-results/

      - name: Execution Summary
        if: always()
        run: |
          echo "executionId=${{ github.event.inputs.executionId }}"
          echo "status=$?"

        with:
          name: playwright-report
          path: playwright-report
