name: Run Playwright

on:
workflow_dispatch:
inputs:
userRequest:
description: "User testing request"
required: true
type: string

```
  executionId:
    description: "Execution ID"
    required: false
    type: string
```

jobs:
test:
runs-on: ubuntu-latest

```
steps:
  # Checkout Repository
  - name: Checkout Repo
    uses: actions/checkout@v4

  # Setup Node.js
  - name: Setup Node.js
    uses: actions/setup-node@v5
    with:
      node-version: 22

  # Debug Workspace
  - name: Debug Workspace
    run: |
      pwd
      ls -la

  # Install Dependencies
  - name: Install Dependencies
    run: |
      if [ -f package-lock.json ]; then
        npm ci
      else
        npm install
      fi

  # Ensure Test Directory Exists
  - name: Ensure Directory Exists
    run: |
      mkdir -p generated-tests

  # Generate Playwright Test File
  - name: Generate Test File
    run: |
      cat > generated-tests/generated.spec.ts << 'EOF'
      import { test, expect } from '@playwright/test';

      test('Generated Test', async ({ page }) => {

        console.log('User Request Received');

        await page.goto('https://qacart.com/');

        await expect(page).toHaveTitle(/QAcart|QA/i);

      });
      EOF

  # Install Playwright Browsers
  - name: Install Playwright Browsers
    run: |
      npx playwright install --with-deps

  # Run Playwright Tests
  - name: Run Playwright Tests
    run: |
      npx playwright test generated-tests/generated.spec.ts

  # Upload Reports
  - name: Upload Test Artifacts
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: playwright-results-${{ github.run_id }}
      path: |
        playwright-report/
        test-results/

  # Execution Summary
  - name: Execution Summary
    if: always()
    run: |
      echo "Execution ID: ${{ github.event.inputs.executionId }}"
      echo "User Request: ${{ github.event.inputs.userRequest }}"
      echo "Run ID: ${{ github.run_id }}"
      node -v
      npm -v
```
