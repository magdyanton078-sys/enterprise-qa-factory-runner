name: Run Playwright

on:
  workflow_dispatch:
    inputs:
      targetUrl:
        description: "Website URL to test"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Clean Previous Results
        run: npm run clean || true

      - name: Create Directories
        run: |
          mkdir -p runner
          mkdir -p test-results
          mkdir -p playwright-report

      - name: Generate Generic Test
        run: |
          cat > runner/generated.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';

          test('Generic Website Test', async ({ page }) => {

            const targetUrl = process.env.TARGET_URL;

            console.log("Testing URL:", targetUrl);

            await page.goto(targetUrl, {
              waitUntil: 'domcontentloaded'
            });

            // Basic checks (works for ANY website)
            await expect(page).toHaveURL(/.*/);

            await expect(page.locator('body')).toBeVisible();

            const title = await page.title();
            expect(title).toBeTruthy();

            const links = page.locator('a');
            const count = await links.count();

            console.log("Page Title:", title);
            console.log("Links Found:", count);

            expect(count).toBeGreaterThanOrEqual(0);
          });
          EOF

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: npm run test:ci

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            runner/

      - name: Execution Summary
        if: always()
        run: |
          echo "Execution ID: ${{ github.event.inputs.executionId }}"
          echo "Target URL: ${{ github.event.inputs.targetUrl }}"
          node -v
          npm -v
