name: Enterprise AI QA Agent

on:
  workflow_dispatch:
    inputs:
      targetUrl:
        description: "Target Website URL"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:
  enterprise-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      ####################################################
      # Checkout
      ####################################################
      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Setup Node
      ####################################################
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      ####################################################
      # Install Dependencies
      ####################################################
      - name: Install Dependencies
        run: npm install

      ####################################################
      # Install Playwright
      ####################################################
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      ####################################################
      # Prepare Workspace
      ####################################################
      - name: Prepare Workspace
        run: |
          mkdir -p generated-tests
          mkdir -p test-results
          mkdir -p playwright-report
          mkdir -p qa-artifacts

      ####################################################
      # DISCOVERY (CRITICAL FIX)
      ####################################################
      - name: Execute Discovery Engine
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          set -e
          npx ts-node scripts/discovery-runner.ts
          echo "Validating discovery output..."
          if [ ! -f test-results/discovery.json ]; then
            echo "ERROR: discovery.json was not created"
            exit 1
          fi

      ####################################################
      # GENERATE TESTS (depends on discovery.json)
      ####################################################
      - name: Generate Dynamic Test Cases
        run: |
          set -e
          npx ts-node scripts/test-generator.ts

          echo "Validating generated test cases..."
          if [ ! -f test-results/generated-tests.json ]; then
            echo "ERROR: generated-tests.json missing"
            exit 1
          fi

      ####################################################
      # BUILD SPECS
      ####################################################
      - name: Build Generated Specs
        run: |
          set -e
          npx ts-node scripts/spec-builder.ts

          echo "Validating Playwright spec..."
          if [ ! -f generated-tests/generated.spec.ts ]; then
            echo "ERROR: generated.spec.ts not found"
            exit 1
          fi

      ####################################################
      # EXECUTION
      ####################################################
      - name: Execute Generated Tests
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          npx playwright test generated-tests

      ####################################################
      # ANALYSIS
      ####################################################
      - name: Analyze Results
        if: always()
        run: |
          npx ts-node scripts/defect-analyzer.ts

      ####################################################
      # SUMMARY
      ####################################################
      - name: QA Summary
        if: always()
        run: |
          echo ""
          echo "==========================================="
          echo "Enterprise QA Execution Summary"
          echo "==========================================="

          cat test-results/final-report.json || echo "No report found"

          echo ""
          echo "Execution ID : ${{ github.event.inputs.executionId }}"
          echo "Target URL   : ${{ github.event.inputs.targetUrl }}"
          echo "==========================================="

      ####################################################
      # ARTIFACTS
      ####################################################
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-qa-${{ github.run_id }}
          path: |
            generated-tests/
            playwright-report/
            test-results/
            qa-artifacts/

      ####################################################
      # FINISH
      ####################################################
      - name: Finish
        if: always()
        run: |
          echo ""
          echo "Enterprise QA Factory Completed Successfully."
