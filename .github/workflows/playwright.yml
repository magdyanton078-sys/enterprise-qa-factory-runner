name: Enterprise AI QA Agent

on:
  workflow_dispatch:
    inputs:
      targetUrl:
        description: "Target Website URL"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:
  enterprise-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Prepare Workspace
        run: |
          mkdir -p test-results
          mkdir -p generated-tests
          mkdir -p playwright-report
          mkdir -p qa-artifacts

      ####################################################
      # 1. DISCOVERY (ONLY SOURCE OF TRUTH)
      ####################################################
      - name: Run Discovery
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          set -e
          npx ts-node scripts/discovery-runner.ts

          echo "Checking discovery output..."
          test -f test-results/discovery.json || (echo "Missing discovery.json" && exit 1)

      ####################################################
      # 2. TEST GENERATION
      ####################################################
      - name: Generate Tests
        run: |
          set -e
          npx ts-node scripts/test-generator.ts

          test -f test-results/generated-tests.json || (echo "Missing generated tests" && exit 1)

      ####################################################
      # 3. SPEC BUILD
      ####################################################
      - name: Build Specs
        run: |
          set -e
          npx ts-node scripts/spec-builder.ts

          test -f generated-tests/generated.spec.ts || (echo "Missing spec file" && exit 1)

      ####################################################
      # 4. EXECUTION
      ####################################################
      - name: Run Tests
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: npx playwright test generated-tests

      ####################################################
      # 5. ANALYSIS
      ####################################################
      - name: Analyze
        if: always()
        run: npx ts-node scripts/defect-analyzer.ts

      ####################################################
      # 6. SUMMARY
      ####################################################
      - name: Summary
        if: always()
        run: |
          echo "================================"
          echo "Execution Summary"
          echo "================================"
          cat test-results/final-report.json || echo "No report"

      ####################################################
      # 7. ARTIFACTS
      ####################################################
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-${{ github.run_id }}
          path: |
            generated-tests/
            test-results/
            playwright-report/
            qa-artifacts/
