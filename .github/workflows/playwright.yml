name: Enterprise AI QA Agent - Universal Runner

on:
  workflow_dispatch:
    inputs:
      targetUrl:
        description: "Target Application URL"
        required: true
        type: string

      executionId:
        description: "Execution Tracking ID"
        required: false
        type: string

      testDepth:
        description: "light | medium | deep | exhaustive"
        required: false
        default: "medium"
        type: string

jobs:
  ai-qa-runner:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        suite:
          - smoke
          - regression
          - negative
          - accessibility
          - performance

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      # ==============================
      # AI TEST GENERATION LAYER
      # ==============================
      - name: AI Test Case Generator (LLM Layer)
        run: |
          mkdir -p runner/suites

          node -e "
          const fs = require('fs');

          const depth = process.env.TEST_DEPTH || 'medium';
          const suite = process.env.SUITE;

          const base = {
            smoke: 5,
            regression: 20,
            negative: 15,
            accessibility: 10,
            performance: 8
          };

          const count = base[suite] || 10;

          const tests = Array.from({length: count}).map((_, i) => ({
            id: suite.toUpperCase() + '-' + (i+1),
            title: suite + ' test ' + (i+1),
            priority: i % 3 === 0 ? 'high' : 'medium'
          }));

          fs.writeFileSync(
            'runner/suites/' + suite + '.json',
            JSON.stringify(tests, null, 2)
          );
          "

        env:
          SUITE: ${{ matrix.suite }}
          TEST_DEPTH: ${{ github.event.inputs.testDepth }}

      # ==============================
      # DYNAMIC TEST EXECUTION
      # ==============================
      - name: Generate Dynamic Playwright Tests
        run: |
          cat > runner/dynamic.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';
          import fs from 'fs';

          const suite = process.env.SUITE!;
          const targetUrl = process.env.TARGET_URL!;

          const tests = JSON.parse(
            fs.readFileSync(`runner/suites/${suite}.json`, 'utf-8')
          );

          test.describe(`AI Suite: ${suite}`, () => {

            for (const t of tests) {

              test(t.id + " - " + t.title, async ({ page }) => {

                const consoleErrors = [];

                page.on('console', msg => {
                  if (msg.type() === 'error') {
                    consoleErrors.push(msg.text());
                  }
                });

                await page.goto(targetUrl, {
                  waitUntil: 'domcontentloaded'
                });

                // Generic AI checks (site-agnostic)
                const title = await page.title();
                expect(title).toBeTruthy();

                const links = await page.locator('a').count();
                const inputs = await page.locator('input, textarea').count();

                await page.screenshot({
                  path: `test-results/${t.id}.png`,
                  fullPage: true
                });

                fs.writeFileSync(
                  `test-results/${t.id}.json`,
                  JSON.stringify({
                    id: t.id,
                    suite,
                    url: targetUrl,
                    title,
                    links,
                    inputs,
                    consoleErrors
                  }, null, 2)
                );

                expect(consoleErrors.length).toBeLessThan(5);
              });

            }

          });
          EOF

        env:
          SUITE: ${{ matrix.suite }}
          TARGET_URL: ${{ github.event.inputs.targetUrl }}

      # ==============================
      # EXECUTION
      # ==============================
      - name: Run Playwright Suite
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
          SUITE: ${{ matrix.suite }}
        run: npm run test:ci

      # ==============================
      # DEFECT CLUSTERING (NEW)
      # ==============================
      - name: Cluster Defects
        if: always()
        run: |
          node -e "
          const fs = require('fs');

          const files = fs.readdirSync('test-results')
            .filter(f => f.endsWith('.json'));

          const errors = [];

          for (const f of files) {
            const d = JSON.parse(fs.readFileSync('test-results/' + f));
            if (d.consoleErrors?.length) {
              errors.push(...d.consoleErrors);
            }
          }

          const clusters = {};

          for (const e of errors) {
            const key = e.toLowerCase().includes('timeout')
              ? 'TIMEOUT'
              : e.toLowerCase().includes('network')
              ? 'NETWORK'
              : 'UI/JS';

            clusters[key] = (clusters[key] || 0) + 1;
          }

          fs.writeFileSync(
            'test-results/defect-clusters.json',
            JSON.stringify(clusters, null, 2)
          );
          "

      # ==============================
      # ARTIFACTS
      # ==============================
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-qa-${{ matrix.suite }}
          path: |
            test-results/
            playwright-report/
            runner/

      # ==============================
      # EXECUTION SUMMARY
      # ==============================
      - name: Summary
        if: always()
        run: |
          echo "Suite: ${{ matrix.suite }}"
          echo "Execution ID: ${{ github.event.inputs.executionId }}"
          echo "Target: ${{ github.event.inputs.targetUrl }}"
