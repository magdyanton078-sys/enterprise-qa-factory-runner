name: Run Playwright

on:
  workflow_dispatch:
    inputs:
      targetUrl:
        description: "Website URL to test"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create Directories
        run: |
          mkdir -p runner
          mkdir -p test-results
          mkdir -p playwright-report

      - name: Generate Dynamic Test
        run: |
          cat > runner/generated.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';
          import fs from 'fs';

          test('Dynamic QA Discovery', async ({ page }) => {

            const url = process.env.TARGET_URL!;

            const consoleErrors: string[] = [];
            const networkFailures: any[] = [];

            page.on('console', msg => {
              if (msg.type() === 'error') {
                consoleErrors.push(msg.text());
              }
            });

            page.on('response', response => {
              if (response.status() >= 400) {
                networkFailures.push({
                  url: response.url(),
                  status: response.status()
                });
              }
            });

            console.log('Testing URL:', url);

            await page.goto(url, {
              waitUntil: 'networkidle',
              timeout: 60000
            });

            await page.waitForTimeout(5000);

            const title = await page.title();

            const buttons =
              await page.locator('button,[role="button"]').count();

            const inputs =
              await page.locator(
                'input,textarea,[role="textbox"]'
              ).count();

            const dropdowns =
              await page.locator(
                'select,[role="combobox"]'
              ).count();

            const links =
              await page.locator('a').count();

            const dom =
              await page.content();

            await page.screenshot({
              path: 'test-results/homepage.png',
              fullPage: true
            });

            fs.writeFileSync(
              'test-results/dom.html',
              dom
            );

            const report = {
              executionTime: new Date().toISOString(),
              url,
              title,
              buttons,
              inputs,
              dropdowns,
              links,
              consoleErrors,
              networkFailures
            };

            fs.writeFileSync(
              'test-results/discovery.json',
              JSON.stringify(report, null, 2)
            );

            console.log(
              JSON.stringify(report, null, 2)
            );

            expect(title).toBeTruthy();
          });
          EOF

      - name: Run Tests
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: npm run test:ci

      - name: Show Discovery Report
        if: always()
        run: |
          echo "========== DISCOVERY REPORT =========="
          cat test-results/discovery.json || true
          echo "======================================"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            runner/

      - name: Summary
        if: always()
        run: |
          echo "Execution ID: ${{ github.event.inputs.executionId }}"
          echo "Target URL: ${{ github.event.inputs.targetUrl }}"
