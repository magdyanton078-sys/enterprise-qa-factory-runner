name: Run Playwright

on:
  workflow_dispatch:

    inputs:

      testScript:
        required: true
        type: string

      targetUrl:
        required: false
        type: string

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:
          node-version: 22

      - run: npm install

      - name: Create Test File

        run: |

          mkdir -p runner

          cat <<'EOF' > runner/generated.spec.ts

          ${{ github.event.inputs.testScript }}

          EOF

      - run: npx playwright install --with-deps

      - run: npx playwright test runner/generated.spec.ts

      - uses: actions/upload-artifact@v4

        if: always()

        with:
          name: playwright-report
          path: playwright-report
