name: Enterprise AI QA Agent

on:
  workflow_dispatch:
    inputs:

      targetUrl:
        description: Target Website URL
        required: true
        type: string

      executionId:
        description: Execution ID
        required: false
        type: string

jobs:

  enterprise-qa:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      ####################################################
      # Checkout
      ####################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # Node
      ####################################################

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      ####################################################
      # Install
      ####################################################

      - name: Install Dependencies
        run: npm install

      ####################################################
      # Playwright
      ####################################################

      - name: Install Browsers
        run: npx playwright install --with-deps

      ####################################################
      # Workspace
      ####################################################

      - name: Prepare Workspace
        run: |
          mkdir -p generated-tests
          mkdir -p test-results
          mkdir -p playwright-report
          mkdir -p qa-artifacts

      ####################################################
      # Discovery
      ####################################################

      - name: Execute Discovery
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          npm run discovery

      ####################################################
      # Verify discovery
      ####################################################

      - name: Verify Discovery
        run: |
          test -f test-results/discovery.json

      ####################################################
      # Generate Tests
      ####################################################

      - name: Generate Tests
        run: |
          npm run generate

      ####################################################
      # Build Specs
      ####################################################

      - name: Build Specs
        run: |
          npm run build-specs

      ####################################################
      # Verify Specs
      ####################################################

      - name: Verify Generated Specs
        run: |
          ls -la generated-tests

      ####################################################
      # Execute Tests
      ####################################################

      - name: Execute Generated Tests
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          npm run test:generated

      ####################################################
      # Analyze
      ####################################################

      - name: Analyze Results
        if: always()
        run: |
          npm run analyze

      ####################################################
      # Summary
      ####################################################

      - name: QA Summary
        if: always()
        run: |

          echo ""
          echo "========================================"
          echo "Enterprise QA Execution Summary"
          echo "========================================"

          if [ -f test-results/qa-analysis.json ]; then
            cat test-results/qa-analysis.json
          else
            echo "No QA Analysis Generated"
          fi

          echo ""
          echo "Execution ID : ${{ github.event.inputs.executionId }}"
          echo "Target URL   : ${{ github.event.inputs.targetUrl }}"
          echo "========================================"

      ####################################################
      # Upload
      ####################################################

      - name: Upload QA Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:

          name: enterprise-qa-${{ github.run_id }}

          path: |
            generated-tests/
            playwright-report/
            test-results/
            qa-artifacts/

          if-no-files-found: warn

      ####################################################
      # Finish
      ####################################################

      - name: Finish
        if: always()
        run: |
          echo ""
          echo "Enterprise QA Factory Completed Successfully."
          echo ""
