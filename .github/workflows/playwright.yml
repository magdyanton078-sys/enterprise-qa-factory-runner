name: Enterprise AI QA Agent

on:
  workflow_dispatch:
    inputs:

      targetUrl:
        description: "Target Website URL"
        required: true
        type: string

      executionId:
        description: "Execution ID"
        required: false
        type: string

jobs:

  qa-agent:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      ########################################################
      # Checkout
      ########################################################

      - uses: actions/checkout@v4

      ########################################################
      # Node
      ########################################################

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      ########################################################
      # Install
      ########################################################

      - name: Install Packages
        run: npm install

      ########################################################
      # Install Playwright
      ########################################################

      - name: Install Browsers
        run: npx playwright install --with-deps

      ########################################################
      # Create folders
      ########################################################

      - name: Prepare Workspace
        run: |
          mkdir -p generated-tests
          mkdir -p test-results
          mkdir -p playwright-report

      ########################################################
      # Discovery
      ########################################################

      - name: Discovery Phase
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          npx ts-node scripts/discovery.ts

      ########################################################
      # AI Test Generation
      ########################################################

      - name: Generate Test Cases
        run: |
          npx ts-node scripts/test-generator.ts

      ########################################################
      # Build Playwright Specs
      ########################################################

      - name: Build Playwright Specs
        run: |
          npx ts-node scripts/spec-builder.ts

      ########################################################
      # Execute Generated Specs
      ########################################################

      - name: Execute Automation Suite
        env:
          TARGET_URL: ${{ github.event.inputs.targetUrl }}
        run: |
          npx playwright test generated-tests

      ########################################################
      # Analyze Results
      ########################################################

      - name: Analyze Defects
        if: always()
        run: |
          npx ts-node scripts/defect-analyzer.ts

      ########################################################
      # Print Summary
      ########################################################

      - name: Print Summary
        if: always()
        run: |

          echo ""
          echo "======================================"
          echo " ENTERPRISE QA EXECUTION SUMMARY"
          echo "======================================"

          cat test-results/final-report.json || true

          echo ""
          echo "======================================"

      ########################################################
      # Upload
      ########################################################

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:

          name: enterprise-qa-results-${{ github.run_id }}

          path: |
            generated-tests/
            playwright-report/
            test-results/

      ########################################################
      # Finish
      ########################################################

      - name: Finish
        if: always()
        run: |

          echo ""
          echo "Execution Finished"
          echo "Execution ID : ${{ github.event.inputs.executionId }}"
          echo "Target URL   : ${{ github.event.inputs.targetUrl }}"
